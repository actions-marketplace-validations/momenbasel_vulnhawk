      <stop offset="0%" style="stop-color:#f85149" />
      <stop offset="100%" style="stop-color:#da3633" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#58a6ff" />
      <stop offset="100%" style="stop-color:#388bfd" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="#0d1117"/>
  
  <!-- Shield outline - clean geometric -->
  <path d="M256 72 L408 140 L392 320 L256 424 L120 320 L104 140 Z" 
